<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>King Vibez</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #ff6f61;
      --secondary-color: #64b5f6;
      --accent-color: #f7b731;
      --text-light: #f5f5f5;
      --background-dark: #1a1a1a;
      --accent-dark: #2e2e2e;
      --shadow-color: rgba(0, 0, 0, 0.5);
      --font-primary: 'Roboto', sans-serif;
      --font-accent: 'Oswald', sans-serif;
      --background-url: url('https://i.ibb.co/Y7dxr9NJ/IMG-20250518-WA0272.jpg');
    }

    body {
      margin: 0;
      font-family: var(--font-primary);
      background-color: var(--background-dark);
      background-image: linear-gradient(45deg, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.5)), var(--background-url);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text-light);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    h1 {
      font-family: var(--font-accent);
      font-size: 3em;
      text-align: center;
      margin-top: 100px;
    }

    p {
      text-align: center;
      max-width: 600px;
      margin: 0 auto 30px;
    }

    .hero-buttons {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      margin-bottom: 40px;
    }

    .btn {
      background-color: var(--primary-color);
      color: white;
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 1em;
      cursor: pointer;
      text-decoration: none;
      transition: 0.3s ease;
    }

    .btn:hover {
      background-color: var(--accent-color);
      transform: translateY(-5px);
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 1.8em;
      margin-top: 20px;
    }

    .social-links a {
      color: white;
      transition: 0.3s ease;
    }

    .social-links a:hover {
      color: var(--primary-color);
      transform: translateY(-4px);
    }

    .menu-toggle {
      position: fixed;
      top: 20px;
      left: 20px;
      background: none;
      border: none;
      color: white;
      font-size: 1.8em;
      z-index: 100;
    }

    .sidebar-menu {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100%;
      background-color: var(--accent-dark);
      color: white;
      padding: 20px;
      transition: 0.3s ease;
      z-index: 99;
    }

    .sidebar-menu.open {
      left: 0;
    }

    .sidebar-menu ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar-menu ul li {
      margin: 20px 0;
    }

    .sidebar-menu ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 1em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-menu ul li a:hover {
      color: var(--accent-color);
    }

    footer {
      margin-top: auto;
      text-align: center;
      padding: 20px;
      background-color: rgba(0, 0, 0, 0.6);
      color: #ccc;
      font-size: 0.9em;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2em;
        margin-top: 80px;
      }

      .btn {
        width: 80%;
        max-width: 300px;
      }
    }
  </style>
</head>
<body>

  <button class="menu-toggle" onclick="toggleMenu()">
    <i class="fas fa-bars"></i>
  </button>

  <nav class="sidebar-menu" id="sidebarMenu">
    <ul>
      <li><a href="#"><i class="fas fa-home"></i> Home</a></li>
      <li><a href="#music"><i class="fas fa-music"></i> Music</a></li>
      <li><a href="#videos"><i class="fas fa-play-circle"></i> Videos</a></li>
      <li><a href="#merch"><i class="fas fa-tshirt"></i> Merch</a></li>
      <li><a href="#tour"><i class="fas fa-calendar"></i> Tour</a></li>
      <li><a href="#about"><i class="fas fa-user"></i> About</a></li>
    </ul>
  </nav>

  <main>
    <h1>King Vibez</h1>
    <p>Experience the rhythm, feel the soul, and dive into the world of King Vibez.</p>

    <div class="hero-buttons">
      <a href="https://open.spotify.com" target="_blank" class="btn">Listen Now</a>
      <a href="https://youtube.com" target="_blank" class="btn">Watch Video</a>
      <a href="https://example.com/merch" target="_blank" class="btn">Shop Merch</a>
      <a href="https://example.com/tour" target="_blank" class="btn">Tour Dates</a>
      <a href="https://example.com/about" target="_blank" class="btn">About</a>
    </div>

    <div class="social-links">
      <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://tiktok.com" target="_blank"><i class="fab fa-tiktok"></i></a>
      <a href="https://youtube.com" target="_blank"><i class="fab fa-youtube"></i></a>
      <a href="https://x.com" target="_blank"><i class="fab fa-x-twitter"></i></a>
      <a href="https://spotify.com" target="_blank"><i class="fab fa-spotify"></i></a>
    </div>
  </main>

  <footer>
    ©2025–<span id="currentYear"></span>. All rights reserved. King Vibez.
  </footer>

  <script>
    function toggleMenu() {
      document.getElementById('sidebarMenu').classList.toggle('open');
    }

    // Set current year
    document.getElementById('currentYear').textContent = new Date().getFullYear();
  </script>

</body>
                                                     </html>
